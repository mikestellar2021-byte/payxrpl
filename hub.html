<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTCC × XRPL Hub | PayXRPL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .card-hover:hover { transform: translateY(-8px); }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <div class="max-w-5xl mx-auto p-4 sm:p-6">

        <!-- HEADER -->
        <div class="bg-zinc-900 border-b border-zinc-800 py-3 mb-10">
            <div class="max-w-5xl mx-auto px-4 flex items-center justify-between text-sm">
                <div class="flex items-center gap-6 font-medium">
                    <a href="/" class="hover:text-emerald-400 transition">Home</a>
                    <a href="/index.html" class="hover:text-emerald-400 transition">Rechnung erstellen</a>
                    <a href="/hub.html" class="text-emerald-400 font-semibold hover:text-emerald-300 transition">DTCC × XRPL Hub</a>
                </div>

                <div class="flex items-center gap-5">
                    <a href="https://github.com/mikestellar2021-byte/xrpl-dtcc-bridge-hub" target="_blank" class="flex items-center gap-1.5 text-zinc-400 hover:text-white">
                        <i class="fa-brands fa-github"></i>
                    </a>
                    <div class="flex gap-1 bg-zinc-800 rounded-3xl p-1">
                        <button onclick="switchLanguage('de')" id="btn-de" class="px-5 py-2 rounded-3xl text-sm font-medium transition">🇩🇪 DE</button>
                        <button onclick="switchLanguage('en')" id="btn-en" class="px-5 py-2 rounded-3xl text-sm font-medium transition">🇬🇧 EN</button>
                    </div>
                </div>
            </div>
        </div>

        <h1 class="text-4xl font-bold mb-2">DTCC × XRPL Hub</h1>
        <p id="description" class="text-zinc-400 mb-8">Praktische Guides, Code-Beispiele und Tools...</p>

        <div class="text-center mt-12">
            <button onclick="switchLanguage('de')" class="bg-emerald-600 px-6 py-3 rounded-xl mx-2">DE</button>
            <button onclick="switchLanguage('en')" class="bg-zinc-700 px-6 py-3 rounded-xl mx-2">EN</button>
        </div>

    </div>

    <script>
        function switchLanguage(lang) {
            console.log("Sprache gewechselt zu:", lang); // Zum Debuggen

            if (lang === 'de') {
                document.getElementById("description").textContent = "Praktische Guides, Code-Beispiele und Tools für XRPL + DTCC (2026)";
            } else {
                document.getElementById("description").textContent = "Practical guides, code samples and tools for XRPL + DTCC (2026)";
            }

            // Button Highlight
            document.getElementById("btn-de").classList.toggle("bg-emerald-600", lang === "de");
            document.getElementById("btn-en").classList.toggle("bg-emerald-600", lang === "en");
        }

        // Start auf Deutsch
        window.onload = () => switchLanguage('de');
    </script>
</body>
</html>
