<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayXRPL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-6">

    <div class="max-w-2xl mx-auto">

        <!-- HEADER -->
        <div class="bg-zinc-900 rounded-3xl p-4 mb-10 flex justify-between items-center">
            <div class="flex gap-6 text-sm">
                <a href="/" class="hover:text-emerald-400">Home</a>
                <a href="#form" class="hover:text-emerald-400">Rechnung erstellen</a>
                <a href="/hub.html" class="text-emerald-400 font-bold">DTCC × XRPL Hub</a>
            </div>
            <div class="flex gap-2">
                <button onclick="switchLanguage('de')" id="btn-de" class="px-5 py-2 bg-emerald-600 rounded-3xl text-sm">🇩🇪 DE</button>
                <button onclick="switchLanguage('en')" id="btn-en" class="px-5 py-2 rounded-3xl text-sm">🇬🇧 EN</button>
            </div>
        </div>

        <h1 class="text-6xl font-bold mb-2">PayXRPL</h1>
        <p class="text-emerald-400 mb-10">Einfach. Schnell. XRPL.</p>

        <div id="form" class="bg-zinc-900 rounded-3xl p-8">
            <h2 id="title" class="text-3xl font-semibold mb-8">Rechnung erstellen</h2>

            <input id="receiver" type="text" placeholder="Wallet-Adresse" class="w-full mb-4 bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5">
            
            <div class="flex gap-3">
                <input id="amount" type="number" step="0.001" placeholder="Betrag in XRP" class="flex-1 bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-3xl">
                <button onclick="addTip()" class="bg-amber-500 hover:bg-amber-600 text-black font-bold px-8 rounded-3xl">+ Tipp</button>
            </div>

            <button onclick="generateQR()" class="mt-8 w-full bg-emerald-500 hover:bg-emerald-600 text-black font-bold text-xl py-7 rounded-3xl">
                Rechnung erstellen + QR Code
            </button>
        </div>

    </div>

    <script>
        function addTip() {
            let amt = document.getElementById("amount");
            amt.value = (parseFloat(amt.value) || 0) + 0.589;
        }

        function generateQR() {
            alert("✅ QR-Code würde jetzt generiert werden (Test erfolgreich!)");
        }

        function switchLanguage(lang) {
            if (lang === 'de') {
                document.getElementById("title").textContent = "Rechnung erstellen";
            } else {
                document.getElementById("title").textContent = "Create Invoice";
            }
        }
    </script>
</body>
</html>
