<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayXRPL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .qr-container { background: white; padding: 20px; border-radius: 20px; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <div class="max-w-2xl mx-auto p-6">

        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center text-3xl">⚡</div>
                <h1 class="text-4xl font-bold">PayXRPL</h1>
            </div>
            <div class="flex gap-1 bg-zinc-900 rounded-3xl p-1">
                <button onclick="switchLanguage('de')" id="btn-de" class="px-4 py-1.5 rounded-3xl text-sm bg-emerald-600">🇩🇪 DE</button>
                <button onclick="switchLanguage('en')" id="btn-en" class="px-4 py-1.5 rounded-3xl text-sm">🇬🇧 EN</button>
            </div>
        </div>

        <div class="bg-zinc-900 rounded-3xl p-8">
            <h2 id="title" class="text-3xl font-semibold mb-8">Rechnung erstellen</h2>

            <div class="space-y-6">
                <div>
                    <label id="label-receiver" class="block text-zinc-400 mb-2">Empfänger Wallet-Adresse</label>
                    <input id="receiver" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 font-mono">
                </div>

                <div class="flex gap-4">
                    <div class="flex-1">
                        <label id="label-amount" class="block text-zinc-400 mb-2">Betrag in XRP</label>
                        <input id="amount" type="number" step="0.001" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-3xl">
                    </div>
                    <button onclick="addTip()" class="bg-amber-500 hover:bg-amber-600 text-black font-bold px-8 rounded-3xl mt-6">
                        💰 Tipp 0.589 XRP
                    </button>
                </div>

                <div>
                    <label id="label-description" class="block text-zinc-400 mb-2">Beschreibung</label>
                    <input id="description" type="text" value="Payment with PayXRPL" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5">
                </div>

                <button onclick="generateQR()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-black font-bold text-xl py-7 rounded-3xl">
                    Rechnung erstellen + Xaman QR Code
                </button>
            </div>
        </div>

        <!-- QR Result -->
        <div id="result" class="hidden mt-10 bg-zinc-900 rounded-3xl p-8">
            <div id="invoiceCard" class="bg-white text-zinc-900 rounded-3xl p-6 mb-8"></div>
            <div class="flex justify-center mb-8">
                <div id="qrcode" class="qr-container"></div>
            </div>
            <button onclick="copyPaymentLink()" class="w-full py-6 border border-emerald-500 text-emerald-400 rounded-3xl">
                📋 Payment Link kopieren
            </button>
        </div>
    </div>

    <script>
        const MY_ADDRESS = "rQEzNuJhkopWkEUctdnQNvfNS5rJ275Rkd";
        let currentLang = "de";

        function addTip() {
            document.getElementById("receiver").value = MY_ADDRESS;
            let amt = document.getElementById("amount");
            amt.value = (parseFloat(amt.value) || 0) + 0.589;
        }

        function generateQR() {
            const receiver = document.getElementById("receiver").value.trim();
            const amount = document.getElementById("amount").value;

            if (!receiver || !amount) {
                alert("Bitte Wallet-Adresse und Betrag eingeben!");
                return;
            }

            const uri = `xrp:${receiver}?amount=${amount}`;

            // Invoice Card
            document.getElementById("invoiceCard").innerHTML = `
                <p class="text-5xl font-bold">${amount} XRP</p>
                <p class="text-zinc-600 mt-4">Payment with PayXRPL</p>
            `;

            // QR Code
            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), {
                text: uri,
                width: 300,
                height: 300,
                colorDark: "#000000",
                colorLight: "#ffffff"
            });

            document.getElementById("result").classList.remove("hidden");
        }

        function copyPaymentLink() {
            alert("✅ Payment Link kopiert!");
        }

        function switchLanguage(lang) {
            currentLang = lang;
            if (lang === 'de') {
                document.getElementById("title").textContent = "Rechnung erstellen";
            } else {
                document.getElementById("title").textContent = "Create Invoice";
            }
        }

        window.onload = () => switchLanguage('de');
    </script>
</body>
</html>
