<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayXRPL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .qr-container { background: white; padding: 20px; border-radius: 20px; }
        @media (max-width: 640px) {
            .form-container { padding: 28px 20px !important; }
            .input-field { padding: 18px !important; font-size: 1.1rem; }
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <div class="max-w-2xl mx-auto p-4 sm:p-6">
        <!-- Header bleibt gleich -->
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center text-3xl">⚡</div>
                <h1 class="text-4xl font-bold tracking-tighter">PayXRPL</h1>
            </div>
            
            <div class="flex gap-1 bg-zinc-900 rounded-3xl p-1">
                <button onclick="switchLanguage('de')" id="btn-de" class="px-4 py-1.5 rounded-3xl text-sm font-medium transition">🇩🇪 DE</button>
                <button onclick="switchLanguage('en')" id="btn-en" class="px-4 py-1.5 rounded-3xl text-sm font-medium transition bg-emerald-600">🇬🇧 EN</button>
                <button onclick="switchLanguage('fr')" id="btn-fr" class="px-4 py-1.5 rounded-3xl text-sm font-medium transition">🇫🇷 FR</button>
                <button onclick="switchLanguage('es')" id="btn-es" class="px-4 py-1.5 rounded-3xl text-sm font-medium transition">🇪🇸 ES</button>
            </div>
        </div>

        <!-- Formular bleibt gleich -->
        <div class="bg-zinc-900 rounded-3xl p-6 sm:p-8 form-container">
            <h2 id="title" class="text-2xl font-semibold mb-6">Create Invoice</h2>
            <!-- ... (alle Felder wie vorher) ... -->
            <div class="space-y-6">
                <!-- Receiver, Amount + Tipp, Description, Memo, Generate Button -->
                <!-- (kopiere aus der letzten Version, die du schon hast) -->
            </div>
        </div>

        <!-- Result Section mit neuem Share-Button -->
        <div id="result" class="hidden bg-zinc-900 rounded-3xl p-6 sm:p-8 mt-8">
            <h3 id="result-title" class="text-xl font-medium mb-4">Your Payment Request</h3>
            <div id="invoiceCard" class="bg-white text-zinc-900 rounded-3xl p-6 mb-8"></div>

            <div class="flex justify-center mb-8">
                <div id="qrcode" class="qr-container"></div>
            </div>

            <div class="flex flex-col gap-3">
                <button onclick="copyPaymentLink()" class="w-full border border-emerald-500 text-emerald-400 hover:bg-emerald-950 py-5 rounded-3xl text-lg font-medium">
                    📋 Copy Payment Link
                </button>
                
                <!-- NEUER SHARE BUTTON -->
                <button onclick="shareOnX()" 
                        class="w-full bg-black hover:bg-zinc-900 border border-white text-white py-5 rounded-3xl text-lg font-medium flex items-center justify-center gap-2">
                    🐦 Share on X
                </button>
            </div>

            <p id="scan-text" class="text-center text-emerald-400 text-lg font-medium mt-6">
                Simply scan this QR code with Xaman!
            </p>
        </div>

        <!-- Footer mit deinem Handle -->
        <div class="mt-16 flex flex-col items-center gap-4 text-zinc-400">
            <a href="https://xstik.art/" target="_blank" class="flex items-center gap-4 group">
                <img src="xstik.png" alt="xSTIK x00428" class="w-20 h-20 rounded-full shadow-2xl object-cover ring-2 ring-emerald-500">
                <div>
                    <span class="text-emerald-400 font-semibold text-xl group-hover:underline">xSTIK</span>
                    <p class="text-emerald-500">x00428</p>
                </div>
            </a>
            <div class="text-center">
                <p class="text-sm">Made with ⚡ by <a href="https://x.com/MikeStellar68" target="_blank" class="text-emerald-400 hover:underline">@MikeStellar68</a></p>
                <p class="text-xs text-zinc-500 mt-1">PayXRPL • Mainnet</p>
            </div>
        </div>
    </div>

    <script>
        // ... (dein bisheriges Script bleibt gleich, nur die neue Funktion wird hinzugefügt)

        function shareOnX() {
            const receiver = document.getElementById("receiver").value.trim();
            const amount = document.getElementById("amount").value;
            const description = document.getElementById("description").value || "Payment";
            const memo = document.getElementById("memo").value || "";

            let uri = `xrp:${receiver}?amount=${amount}`;
            if (memo) uri += `&m=${encodeURIComponent(memo)}`;

            const text = `Just created a payment request with PayXRPL ⚡\n\nPay me ${amount} XRP\n${description}\n\n${uri}\n\n#XRP #XRPL`;
            
            const tweetUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
            window.open(tweetUrl, '_blank');
        }

        // Rest deines Scripts (switchLanguage, addTip, generateQR, copyPaymentLink, onload) bleibt gleich
    </script>
</body>
</html>
