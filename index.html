<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayXRPL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .qr-container { background: white; padding: 20px; border-radius: 20px; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <div class="max-w-2xl mx-auto p-4 sm:p-6">

        <!-- HEADER -->
        <div class="bg-zinc-900 border-b border-zinc-800 py-4 mb-10">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-6 text-sm font-medium">
                    <a href="/" class="hover:text-emerald-400">Home</a>
                    <a href="#form" class="hover:text-emerald-400">Rechnung erstellen</a>
                    <a href="/hub.html" class="text-emerald-400 font-semibold">DTCC × XRPL Hub</a>
                </div>
                <div class="flex gap-1 bg-zinc-800 rounded-3xl p-1">
                    <button onclick="switchLanguage('de')" id="btn-de" class="px-5 py-2 rounded-3xl text-sm bg-emerald-600">🇩🇪 DE</button>
                    <button onclick="switchLanguage('en')" id="btn-en" class="px-5 py-2 rounded-3xl text-sm">🇬🇧 EN</button>
                </div>
            </div>
        </div>

        <!-- Logo -->
        <div class="flex items-center gap-4 mb-10">
            <div class="w-12 h-12 bg-emerald-500 rounded-2xl flex items-center justify-center text-4xl">⚡</div>
            <h1 class="text-5xl font-bold">PayXRPL</h1>
        </div>

        <div id="form" class="bg-zinc-900 rounded-3xl p-8">
            <h2 id="title" class="text-3xl font-semibold mb-8">Rechnung erstellen</h2>

            <div class="space-y-6">
                <div>
                    <label id="label-receiver" class="block mb-2 text-zinc-400">Empfänger Wallet-Adresse</label>
                    <input id="receiver" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-lg">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div class="sm:col-span-2">
                        <label id="label-amount" class="block mb-2 text-zinc-400">Betrag in XRP</label>
                        <input id="amount" type="number" step="0.001" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-4xl">
                    </div>
                    <button onclick="addTip()" class="bg-amber-500 hover:bg-amber-600 text-black font-bold rounded-3xl text-lg">
                        💰 Tipp<br>0.589 XRP
                    </button>
                </div>

                <div>
                    <label id="label-description" class="block mb-2 text-zinc-400">Beschreibung</label>
                    <input id="description" type="text" value="Payment with PayXRPL" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5">
                </div>

                <button onclick="generateQR()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-black font-bold text-xl py-7 rounded-3xl mt-4">
                    Rechnung erstellen + Xaman QR Code
                </button>
            </div>
        </div>

        <div id="result" class="hidden mt-10 bg-zinc-900 rounded-3xl p-8">
            <div id="invoiceCard" class="bg-white text-black p-6 rounded-3xl mb-8"></div>
            <div class="flex justify-center mb-8">
                <div id="qrcode" class="qr-container"></div>
            </div>
            <button onclick="copyPaymentLink()" class="w-full py-6 border border-emerald-500 text-emerald-400 rounded-3xl text-lg">
                📋 Payment Link kopieren
            </button>
        </div>

    </div>

    <script>
        let currentLang = "de";

        const translations = {
            de: {
                title: "Rechnung erstellen",
                labelReceiver: "Empfänger Wallet-Adresse",
                labelAmount: "Betrag in XRP",
                labelDescription: "Beschreibung"
            },
            en: {
                title: "Create Invoice",
                labelReceiver: "Recipient Wallet Address",
                labelAmount: "Amount in XRP",
                labelDescription: "Description"
            }
        };

        function switchLanguage(lang) {
            currentLang = lang;
            document.getElementById("title").textContent = translations[lang].title;
            document.getElementById("label-receiver").textContent = translations[lang].labelReceiver;
            document.getElementById("label-amount").textContent = translations[lang].labelAmount;
            document.getElementById("label-description").textContent = translations[lang].labelDescription;
        }

        function addTip() {
            let amt = document.getElementById("amount");
            amt.value = (parseFloat(amt.value) || 0) + 0.589;
        }

        function generateQR() {
            alert(currentLang === "de" ? "QR-Code wird generiert..." : "Generating QR Code...");
            // Hier kommt später der volle QR-Code Code
        }

        function copyPaymentLink() {
            alert("Link kopiert!");
        }

        window.onload = () => switchLanguage('de');
    </script>
</body>
</html>
