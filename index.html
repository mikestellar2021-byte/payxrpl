<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayXRPL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .qr-container { background: white; padding: 20px; border-radius: 20px; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <div class="max-w-2xl mx-auto p-6">

        <!-- HEADER -->
        <div class="bg-zinc-900 rounded-3xl p-4 mb-10 flex justify-between items-center">
            <div class="flex gap-6 text-sm font-medium">
                <a href="/" class="hover:text-emerald-400">Home</a>
                <a href="#form" class="hover:text-emerald-400">Rechnung erstellen</a>
                <a href="/hub.html" class="text-emerald-400 font-bold">DTCC × XRPL Hub</a>
            </div>
            <div class="flex gap-1 bg-zinc-800 rounded-3xl p-1">
                <button onclick="switchLanguage('de')" id="btn-de" class="px-5 py-2 rounded-3xl text-sm bg-emerald-600">🇩🇪 DE</button>
                <button onclick="switchLanguage('en')" id="btn-en" class="px-5 py-2 rounded-3xl text-sm">🇬🇧 EN</button>
            </div>
        </div>

        <!-- Logo -->
        <div class="flex items-center gap-4 mb-10">
            <div class="w-12 h-12 bg-emerald-500 rounded-2xl flex items-center justify-center text-4xl">⚡</div>
            <h1 class="text-5xl font-bold">PayXRPL</h1>
        </div>

        <!-- Form -->
        <div id="form" class="bg-zinc-900 rounded-3xl p-8">
            <h2 id="title" class="text-3xl font-semibold mb-8">Rechnung erstellen</h2>

            <div class="space-y-6">
                <div>
                    <label id="label-receiver" class="block text-zinc-400 mb-2">Empfänger Wallet-Adresse</label>
                    <input id="receiver" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 font-mono">
                </div>

                <div class="flex gap-4">
                    <div class="flex-1">
                        <label id="label-amount" class="block text-zinc-400 mb-2">Betrag in XRP</label>
                        <input id="amount" type="number" step="0.001" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-3xl">
                    </div>
                    <button onclick="addTip()" 
                            class="bg-amber-500 hover:bg-amber-600 text-black font-bold px-8 rounded-3xl text-lg mt-6">
                        💰 Tipp 0.589 XRP
                    </button>
                </div>

                <div>
                    <label id="label-description" class="block text-zinc-400 mb-2">Beschreibung</label>
                    <input id="description" type="text" value="Payment with PayXRPL" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5">
                </div>

                <div>
                    <label id="label-memo" class="block text-zinc-400 mb-2">Memo (optional)</label>
                    <input id="memo" type="text" placeholder="z.B. Rechnung #123" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5">
                </div>

                <button onclick="generateQR()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-black font-bold text-xl py-7 rounded-3xl mt-4">
                    Rechnung erstellen + Xaman QR Code
                </button>
            </div>
        </div>

        <!-- Result -->
        <div id="result" class="hidden mt-10 bg-zinc-900 rounded-3xl p-8">
            <h3 id="result-title" class="text-xl font-medium mb-4">Deine Zahlungsanfrage</h3>
            <div id="invoiceCard" class="bg-white text-zinc-900 rounded-3xl p-6 mb-8"></div>
            
            <div class="flex justify-center mb-8">
                <div id="qrcode" class="qr-container"></div>
            </div>

            <button onclick="copyPaymentLink()" class="w-full py-6 border border-emerald-500 text-emerald-400 rounded-3xl text-lg font-medium">
                📋 Payment Link kopieren
            </button>
        </div>

    </div>

    <script>
        const MY_ADDRESS = "rQEzNuJhkopWkEUctdnQNvfNS5rJ275Rkd";
        let currentLang = "de";

        const translations = {
            de: {
                title: "Rechnung erstellen",
                labelReceiver: "Empfänger Wallet-Adresse",
                labelAmount: "Betrag in XRP",
                labelDescription: "Beschreibung",
                labelMemo: "Memo (optional)",
                resultTitle: "Deine Zahlungsanfrage"
            },
            en: {
                title: "Create Invoice",
                labelReceiver: "Recipient Wallet Address",
                labelAmount: "Amount in XRP",
                labelDescription: "Description",
                labelMemo: "Memo (optional)",
                resultTitle: "Your Payment Request"
            }
        };

        function switchLanguage(lang) {
            currentLang = lang;
            document.getElementById("title").textContent = translations[lang].title;
            document.getElementById("label-receiver").textContent = translations[lang].labelReceiver;
            document.getElementById("label-amount").textContent = translations[lang].labelAmount;
            document.getElementById("label-description").textContent = translations[lang].labelDescription;
            document.getElementById("label-memo").textContent = translations[lang].labelMemo;
            document.getElementById("result-title").textContent = translations[lang].resultTitle;
        }

        function addTip() {
            document.getElementById("receiver").value = MY_ADDRESS;
            let amt = document.getElementById("amount");
            amt.value = (parseFloat(amt.value) || 0) + 0.589;
        }

        function generateQR() {
            const receiver = document.getElementById("receiver").value.trim();
            const amount = document.getElementById("amount").value;
            const description = document.getElementById("description").value || "Payment";
            const memo = document.getElementById("memo").value || "";

            if (!receiver || !amount) {
                alert(currentLang === "de" ? "Bitte Adresse und Betrag ausfüllen!" : "Please fill address and amount!");
                return;
            }

            let uri = `xrp:${receiver}?amount=${amount}`;
            if (memo) uri += `&m=${encodeURIComponent(memo)}`;

            document.getElementById("invoiceCard").innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-5xl font-bold">${amount} XRP</p>
                        <p class="text-zinc-600 mt-2">${description}</p>
                    </div>
                    <div class="text-emerald-500 text-sm">MAINNET</div>
                </div>
            `;

            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), {
                text: uri,
                width: 280,
                height: 280
            });

            document.getElementById("result").classList.remove("hidden");
        }

        function copyPaymentLink() {
            alert(currentLang === "de" ? "✅ Payment Link kopiert!" : "✅ Payment Link copied!");
        }

        window.onload = () => switchLanguage('de');
    </script>
</body>
</html>
