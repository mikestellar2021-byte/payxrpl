<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayXRPL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .qr-container { background: white; padding: 20px; border-radius: 20px; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <div class="max-w-2xl mx-auto p-6">

        <!-- HEADER -->
        <div class="bg-zinc-900 border-b border-zinc-800 py-4 mb-10 flex justify-between items-center">
            <div class="flex gap-6 text-sm font-medium">
                <a href="/" class="hover:text-emerald-400">Home</a>
                <a href="#form" class="hover:text-emerald-400">Rechnung erstellen</a>
                <a href="/hub.html" class="text-emerald-400 font-bold">DTCC × XRPL Hub</a>
            </div>
            <div class="flex gap-1 bg-zinc-800 rounded-3xl p-1">
                <button onclick="switchLanguage('de')" id="btn-de" class="px-5 py-2 rounded-3xl text-sm bg-emerald-600">🇩🇪 DE</button>
                <button onclick="switchLanguage('en')" id="btn-en" class="px-5 py-2 rounded-3xl text-sm">🇬🇧 EN</button>
            </div>
        </div>

        <div class="flex items-center gap-4 mb-10">
            <div class="w-12 h-12 bg-emerald-500 rounded-2xl flex items-center justify-center text-4xl">⚡</div>
            <h1 class="text-5xl font-bold">PayXRPL</h1>
        </div>

        <div id="form" class="bg-zinc-900 rounded-3xl p-8">
            <h2 id="title" class="text-3xl font-semibold mb-8">Rechnung erstellen</h2>

            <div class="space-y-6">
                <div>
                    <label class="block text-zinc-400 mb-2">Empfänger Wallet-Adresse</label>
                    <input id="receiver" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5">
                </div>

                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-zinc-400 mb-2">Betrag in XRP</label>
                        <input id="amount" type="number" step="0.001" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-3xl">
                    </div>
                    <button onclick="addTip()" class="bg-amber-500 hover:bg-amber-600 text-black font-bold px-8 rounded-3xl mt-6">+ Tipp 0.589</button>
                </div>

                <button onclick="generateQR()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-black font-bold text-xl py-7 rounded-3xl">
                    Rechnung erstellen + Xaman QR Code
                </button>
            </div>
        </div>

    </div>

    <script>
        function addTip() {
            let amt = document.getElementById("amount");
            amt.value = (parseFloat(amt.value) || 0) + 0.589;
        }

        function generateQR() {
            alert("✅ Button funktioniert! (Test erfolgreich)");
        }

        function switchLanguage(lang) {
            if (lang === 'de') {
                document.getElementById("title").textContent = "Rechnung erstellen";
            } else {
                document.getElementById("title").textContent = "Create Invoice";
            }
        }
    </script>
</body>
</html>
