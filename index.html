<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayXRPL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .qr-container { background: white; padding: 20px; border-radius: 20px; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <div class="max-w-2xl mx-auto p-4 sm:p-6">

        <!-- Einfaches Logo -->
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center text-3xl">⚡</div>
                <h1 class="text-4xl font-bold tracking-tighter">PayXRPL</h1>
            </div>
            
            <div class="flex gap-1 bg-zinc-900 rounded-3xl p-1">
                <button onclick="switchLanguage('de')" id="btn-de" class="px-4 py-1.5 rounded-3xl text-sm font-medium transition">🇩🇪 DE</button>
                <button onclick="switchLanguage('en')" id="btn-en" class="px-4 py-1.5 rounded-3xl text-sm font-medium transition bg-emerald-600">🇬🇧 EN</button>
            </div>
        </div>

        <div class="bg-zinc-900 rounded-3xl p-6 sm:p-8">
            <h2 id="title" class="text-2xl font-semibold mb-6">Create Invoice</h2>
            
            <div class="space-y-6">
                <div>
                    <label id="label-receiver" class="block text-zinc-400 text-sm mb-2">Recipient Wallet Address</label>
                    <input id="receiver" type="text" placeholder="Your XRPL wallet address here..." class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-5 py-4 font-mono">
                </div>

                <div class="flex flex-col sm:flex-row gap-3 items-end">
                    <div class="flex-1">
                        <label id="label-amount" class="block text-zinc-400 text-sm mb-2">Amount in XRP</label>
                        <input id="amount" type="number" step="0.000001" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-5 py-4 text-4xl">
                    </div>
                    <button onclick="addTip()" class="bg-amber-500 hover:bg-amber-600 text-black font-semibold px-8 py-4 rounded-3xl">
                        💰 Tipp 0.589 XRP
                    </button>
                </div>

                <div>
                    <label id="label-description" class="block text-zinc-400 text-sm mb-2">Description</label>
                    <input id="description" type="text" value="Payment with PayXRPL" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-5 py-4">
                </div>

                <div>
                    <label id="label-memo" class="block text-zinc-400 text-sm mb-2">Memo (optional)</label>
                    <input id="memo" type="text" placeholder="e.g. Invoice #123" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-5 py-4">
                </div>

                <button onclick="generateQR()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-black font-semibold text-xl py-6 rounded-3xl">
                    Create Invoice + Xaman QR Code
                </button>
            </div>
        </div>

        <div id="result" class="hidden mt-8 bg-zinc-900 rounded-3xl p-6 sm:p-8">
            <h3 id="result-title" class="text-xl font-medium mb-4">Your Payment Request</h3>
            <div id="invoiceCard" class="bg-white text-zinc-900 rounded-3xl p-6 mb-8"></div>
            <div class="flex justify-center mb-8">
                <div id="qrcode" class="qr-container"></div>
            </div>
            <button onclick="copyPaymentLink()" class="w-full border border-emerald-500 text-emerald-400 py-5 rounded-3xl">
                📋 Copy Payment Link
            </button>
        </div>

    </div>

    <script>
        let currentLang = "en";
        const MY_ADDRESS = "rQEzNuJhkopWkEUctdnQNvfNS5rJ275Rkd";

        const translations = {
            de: {
                title: "Rechnung erstellen",
                labelReceiver: "Empfänger Wallet-Adresse",
                labelAmount: "Betrag in XRP",
                labelDescription: "Beschreibung",
                labelMemo: "Memo (optional)",
                resultTitle: "Deine Zahlungsanfrage"
            },
            en: {
                title: "Create Invoice",
                labelReceiver: "Recipient Wallet Address",
                labelAmount: "Amount in XRP",
                labelDescription: "Description",
                labelMemo: "Memo (optional)",
                resultTitle: "Your Payment Request"
            }
        };

        function switchLanguage(lang) {
            currentLang = lang;
            document.getElementById("title").textContent = translations[lang].title;
            document.getElementById("label-receiver").textContent = translations[lang].labelReceiver;
            document.getElementById("label-amount").textContent = translations[lang].labelAmount;
            document.getElementById("label-description").textContent = translations[lang].labelDescription;
            document.getElementById("label-memo").textContent = translations[lang].labelMemo;
            document.getElementById("result-title").textContent = translations[lang].resultTitle;
        }

        function addTip() {
            document.getElementById("receiver").value = MY_ADDRESS;
            let amt = document.getElementById("amount");
            amt.value = (parseFloat(amt.value) || 0) + 0.589;
        }

        function generateQR() {
            // ... (QR Code Logik)
            alert("QR Code wird generiert...");
        }

        function copyPaymentLink() {
            alert("Link kopiert!");
        }

        window.onload = () => switchLanguage('de');
    </script>
</body>
</html>
